# 课程报告生成工具 — 部署栈（GHCR 镜像）
# 端口 8767（与本地栈 ../docker/course-report-generator/ 8766 区分，不要同启）
#
# ★ 需要修改的两处 ★
#   1) AI 配置：./config/llm.yaml（已挂载进容器，修改后 docker compose restart）
#   2) 端口：CRG_HOST_PORT（默认 8767）
#
# 常用命令：
#   docker compose up -d       启动
#   docker compose restart     改完配置重启
#   docker compose logs -f     查看日志
#   docker compose down        停止

services:
  course-report-generator:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/course-report-generator}:latest
    container_name: course-report
    restart: unless-stopped

    ports:
      - "${CRG_HOST_PORT:-8767}:8765"

    volumes:
      - crg_data:/app/data
      - ./config/llm.yaml:/app/config/llm.yaml:ro
      - /Users/kylo/Documents/Workspace:/Users/kylo/Documents/Workspace
      - /Users/kylo/Desktop:/Users/kylo/Desktop
      - /Users/kylo/Documents:/Users/kylo/Documents

volumes:
  crg_data:
