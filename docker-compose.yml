# ===================================================================
# docker-compose.yml — 课程报告生成工具
# ===================================================================
# 使用方式：
#
#   1. 设置环境变量（推荐写入 .env 文件）：
#         echo 'CRG_LLM_API_KEY=sk-xxxxxxxx' >> .env
#
#   2. 启动服务：
#         docker compose up -d
#
#   3. 打开浏览器访问：
#         http://localhost:8765
#
#   4. 查看日志：
#         docker compose logs -f
# ===================================================================
#
# ⚠ 首次使用需要配置 AI 供应商 API Key，
#    以下是三种方式（任选其一）：
#
#   A) 环境变量（推荐）：
#         CRG_LLM_API_KEY=sk-xxxxx  → 对应 CRG_LLM__API_KEY
#
#   B) .env 文件（本文件同目录）：
#         CRG_LLM_API_KEY=sk-xxxxx
#
#   C) 挂载本地 llm.yaml：
#         volumes: [./config/llm.yaml:/app/config/llm.yaml]
#
# ===================================================================

services:
  course-report-generator:
    # ── 镜像 ──────────────────────────────────────────────
    # 优先使用已推送至 GHCR 的镜像。
    # 如需本地构建，取消下行注释并注释上方 image 行：
    # build: .
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/course-report-generator}:latest
    container_name: course-report

    # ── 端口 ──────────────────────────────────────────────
    ports:
      - "${CRG_HOST_PORT:-8765}:8765"

    # ── 环境变量 ──────────────────────────────────────────
    # 所有配置均可通过 CRG_ 前缀的环境变量覆盖。
    # 完整字段映射见 backend/config.py。
    environment:
      # LLM / AI 供应商（必填：API Key）
      - CRG_LLM__PROVIDER=${CRG_LLM_PROVIDER:-deepseek}
      - CRG_LLM__API_KEY=${CRG_LLM_API_KEY:?请设置 CRG_LLM_API_KEY 环境变量}
      - CRG_LLM__DEFAULT_MODEL=${CRG_LLM_DEFAULT_MODEL:-deepseek-chat}
      - CRG_LLM__BASE_URL=${CRG_LLM_BASE_URL:-}
      - CRG_LLM__TIMEOUT=${CRG_LLM_TIMEOUT:-60}
      - CRG_LLM__MAX_RETRIES=${CRG_LLM_MAX_RETRIES:-2}

      # 应用配置
      - CRG_APP__DEBUG=${CRG_APP_DEBUG:-false}
      - CRG_APP__LOG_LEVEL=${CRG_APP_LOG_LEVEL:-INFO}

      # 数据库（SQLite 默认存储在 /app/data/app.db，已在 volume 中持久化）
      - CRG_DATABASE__URL=${CRG_DATABASE_URL:-sqlite+aiosqlite:///./data/app.db}
      - CRG_SERVER__HOST=0.0.0.0
      - CRG_SERVER__PORT=${CRG_SERVER_PORT:-8765}
      - CRG_SERVER__RELOAD=false

      # 报告目录（使用 volume 内路径）
      - CRG_REPORT__OUTPUT_DIR=${CRG_REPORT_OUTPUT_DIR:-./data/reports}
      - CRG_REPORT__SCREENSHOT_DIR=${CRG_REPORT_SCREENSHOT_DIR:-./data/screenshots}
      - CRG_REPORT__ASSET_DIR=${CRG_REPORT_ASSET_DIR:-./data/assets}

      # Logo
      - CRG_LOGO__ENABLED=${CRG_LOGO_ENABLED:-false}

    # ── 持久化 ────────────────────────────────────────────
    # SQLite 数据库、导出的 PDF 报告、截图等保存在命名 volume 中。
    # 如需挂载宿主机目录替代，改为：
    #   volumes:
    #     - ./data:/app/data
    volumes:
      - crg_data:/app/data

    # ── 重启策略 ──────────────────────────────────────────
    restart: unless-stopped

volumes:
  crg_data:
