<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程报告生成工具</title>
  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <!-- Element Plus -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
  <!-- Element Plus Icons -->
  <script src="https://unpkg.com/@element-plus/icons-vue"></script>
  <!-- 应用样式 -->
  <link rel="stylesheet" href="/styles/app.css">
</head>
<body>
  <div id="app">
    <el-container style="min-height: 100vh;">
      <!-- 侧边栏 -->
      <el-aside width="200px" class="app-sidebar">
        <div class="sidebar-header">
          <h2>📋 课程报告</h2>
        </div>
        <el-menu
          :default-active="currentRoute"
          class="sidebar-menu"
          @select="navigateTo"
        >
          <el-menu-item index="dashboard">
            <el-icon><HomeFilled /></el-icon>
            <span>首页</span>
          </el-menu-item>
          <el-menu-item index="drafts">
            <el-icon><Document /></el-icon>
            <span>草稿管理</span>
          </el-menu-item>
          <el-menu-item index="editor">
            <el-icon><Edit /></el-icon>
            <span>报告编辑</span>
          </el-menu-item>
        </el-menu>
      </el-aside>

      <!-- 主内容 -->
      <el-container>
        <el-header class="app-header">
          <div class="header-left">
            <h3>{{ pageTitle }}</h3>
          </div>
          <div class="header-right">
            <el-tag v-if="currentRoute === 'editor' && editingRecordId" type="warning" size="small">
              编辑中: #{{ editingRecordId }}
            </el-tag>
            <span class="header-version">v0.5.0</span>
          </div>
        </el-header>
        <el-main class="app-main">
          <component :is="currentView" />
        </el-main>
      </el-container>
    </el-container>
  </div>

  <!-- 路由 -->
  <script src="/src/router.js"></script>
  <!-- API 客户端 -->
  <script src="/src/api.js"></script>
  <!-- 视图组件 -->
  <script src="/src/views/Dashboard.js"></script>
  <script src="/src/views/DraftList.js"></script>
  <script src="/src/views/ReportEditor.js"></script>
  <!-- 启动应用 -->
  <script src="/src/app.js"></script>
</body>
</html>
